<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>야간 작업(야작) 좌석 예약</title>
  <link rel="stylesheet" href="styles.css"/>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
  <h1>야간 작업(야작) 좌석 예약</h1>

  <div class="room-header">
    <div id="roomTabs" class="room-tabs"></div>
    <div id="activeRoomDisplay" class="active-room-display"></div>
  </div>

  <div id="weekTabs" class="week-tabs"></div>
  
  <div class="hint" style="color:red; font-weight: bold;">
    ※ 나만의 4자리 숫자는 예약 조회 및 취소 시 본인 확인용입니다. 반드시 기억해 주세요!
  </div>
  <div class="hint">* 모든 예약은 한국 표준시(KST) 기준으로 운영됩니다.</div>

  <div id="seatLayout" class="seat-container"></div>

  <div id="bookingModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <h2 id="modalTitle">좌석 예약</h2>
      <input id="modalName" type="text" placeholder="이름 (실명)" />
      <input id="modalStudentId" type="text" placeholder="학번 (8자리)" />
      <input id="modalPhoneNumber" type="password" placeholder="나만의 4자리 숫자 (취소용)" maxlength="4" />
      <div class="modal-actions">
        <button id="modalSubmitBtn">예약하기</button>
        <button id="modalCloseBtn" style="background:#95a5a6;">닫기</button>
      </div>
    </div>
  </div>

  <div id="confirmationModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <h2>예약 완료!</h2>
      <p id="confirmationMessage" style="line-height: 1.6;"></p>
      <div class="modal-actions">
        <button id="confirmationCloseBtn">확인</button>
      </div>
    </div>
  </div>

  <hr style="margin: 40px 0; border: 0; border-top: 1px solid #ccc;">

  <h2>예약 조회 및 취소</h2>
  <div id="openChatLinkContainer" class="hint" style="margin-bottom: 15px;"></div>

  <div class="search-bar" style="text-align:center;">
    <input id="searchName" placeholder="이름" style="display:inline-block; width:120px;"/>
    <input id="searchStudentId" placeholder="학번" style="display:inline-block; width:150px;"/>
    <input id="searchPhoneNumber" type="password" placeholder="4자리 숫자" style="display:inline-block; width:100px;"/>
    <button id="searchBtn">조회하기</button>
    <button id="copyCsvBtn" title="관리
